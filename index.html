<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francisco Cortés Arce | Portafolio de Branding 2002-2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Importación de fuentes */
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@200;300;400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@700;800;900&display=swap');
        
        :root {
            --brand-green: #009a82; 
            --bg-gray-mid: #cacccb;
            --bg-gray-light: #e3e6e4;
            --text-dark: #1e293b;
            --text-accessible-gray: #334155; /* Gris más oscuro para accesibilidad */
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Titillium Web', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: var(--bg-gray-light);
            overflow-x: hidden;
        }

        /* TIPOGRAFÍA BASE */
        .titillium-base { font-family: 'Titillium Web', sans-serif; font-weight: 400; letter-spacing: -0.01em; line-height: 1.2; }
        .montserrat-black-caps { font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 0.02em; font-weight: 900; }
        .montserrat-caps { font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 800; }
        
        h1, h2, h3, h4 { font-family: 'Titillium Web', sans-serif; font-weight: 700; letter-spacing: -0.02em; }

        .garamond-bold-italic {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 1.22em; 
            letter-spacing: -0.01em;
            line-height: 1;
        }

        /* ESTILOS ESPECÍFICOS DEL PORTAFOLIO */
        .project-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.125rem; /* 1.5x de escala */
            letter-spacing: 0.05em; /* Distancia entre letras compacta */
            line-height: 1.2;
            color: var(--text-dark);
        }

        .project-phrase {
            font-family: 'Titillium Web', sans-serif;
            font-weight: 400;
            font-size: 1.05rem; /* 1.5x de escala */
            color: var(--text-accessible-gray);
            line-height: 1.2;
        }

        /* --- NAVEGACIÓN --- */
        #main-nav {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            height: 80px !important;
            z-index: 2000 !important;
            transition: background-color 0.6s ease, color 0.5s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-link { position: relative; transition: color 0.3s ease; }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0; height: 2px; bottom: -4px; left: 0;
            background-color: var(--brand-green);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }

        .lang-btn { cursor: pointer; opacity: 0.5; transition: opacity 0.3s ease; }
        .lang-btn.active { opacity: 1; border-bottom: 2px solid var(--brand-green); }

        #mobile-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1500;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-100%); opacity: 0; pointer-events: none;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        #mobile-menu.active { transform: translateY(0); opacity: 1; pointer-events: auto; }

        /* --- HERO --- */
        #hero {
            background-image: url('https://project-s9rxa.vercel.app/images/marker-bg.jpg');
            background-size: cover;
            background-position: center;
            background-color: var(--bg-gray-mid);
        }

        .hero-headline-container { 
            display: flex; 
            justify-content: center; 
            width: 100%; 
            position: relative; 
        }
        
        .hero-headline { 
            display: inline-flex; 
            align-items: baseline; 
            justify-content: center;
            position: relative; 
            transition: all 0.7s cubic-bezier(0.65, 0, 0.35, 1); 
        }

        .flip-viewport {
            height: 3em; 
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            transition: width 0.7s cubic-bezier(0.65, 0, 0.35, 1);
            width: auto;
            min-width: 50px;
        }

        .flip-list {
            display: flex;
            flex-direction: column;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            margin: 0; padding: 0; list-style: none;
        }

        .flip-item {
            height: 3em; 
            display: flex;
            align-items: center;
            white-space: nowrap;
            position: relative;
        }

        #addons-layer {
            position: absolute;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s ease-out;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #addons-layer.active { opacity: 1; }

        .text-brand-accent { color: var(--brand-green) !important; }

        @keyframes bounceDown {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(8px);}
            60% {transform: translateY(4px);}
        }
        .scroll-indicator i { animation: bounceDown 2s infinite; }

        .project-card { transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .project-card:hover { transform: translateY(-10px); }

        .case-image-container {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            background-color: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 1.5rem;
        }
        .case-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .project-card:hover .case-image-container img { transform: scale(1.05); }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <script>
        const translations = {
            es: {
                'nav-manifiesto': 'Manifiesto',
                'nav-portfolio': 'Portafolio',
                'nav-contact': 'Contacto',
                'hero-design': 'diseño',
                'hero-words': ['apropiado', 'útil', 'auténtico', 'estratégico', 'cortés'],
                'hero-intro': 'Estrategias e innovación para marcas que quieren mostrar lo que son y no disfrazarse de tendencias o modas pasajeras.',
                'hero-scroll': '¿De qué hablo?',
                'manifiesto-title': 'Sentido <br>antes que <br><span class="garamond-bold-italic text-slate-500 lowercase">pinta vacía</span>.',
                'manifiesto-p1': 'Entiendo el branding como la <span class="garamond-bold-italic text-slate-900">construcción de sentido</span>. No se trata únicamente de diseñar identidades "bonitas", sino de definir con claridad qué representa una marca.',
                'manifiesto-h1': '<span class="garamond-bold-italic text-brand-accent">Diferenciación</span> con coherencia',
                'manifiesto-desc1': 'Mi trabajo se enfoca en construir marcas entendidas como sistemas. Cada proyecto es abordado desde su contexto particular.',
                'manifiesto-h2': '<span class="garamond-bold-italic text-brand-accent">Función</span> sobre tendencia',
                'manifiesto-desc2': 'El diseño es una disciplina de servicio cuya validación reside en el cumplimiento de su función. Priorizo la resolución de problemas reales.',
                'manifiesto-h3': '<span class="garamond-bold-italic text-brand-accent">Legado</span> sobre lo efímero',
                'manifiesto-desc3': 'Las marcas no deben ser algo pasajero. Diseño soluciones pensadas para resistir el tiempo y aportar valor duradero.',
                'portfolio-title': 'Casos de <span class="garamond-bold-italic font-bold text-brand-accent">branding</span>',
                'case-name-coboce': 'COBOCE COOP',
                'case-phrase-coboce': 'Llamemos al pueblo de vuelta a la industria',
                'case-name-wistupiku': 'WIST\'UPIKU',
                'case-phrase-wistupiku': 'Del rescate cultural, su divertido',
                'case-name-simp3l': 'SIMP3L',
                'case-phrase-simp3l': 'Iguales, pero tampoco tanto',
                'contact-title': 'Hablemos de <br><span class="garamond-bold-italic text-slate-800 lowercase">sentido y permanencia</span>.'
            },
            en: {
                'nav-manifiesto': 'Manifesto',
                'nav-portfolio': 'Portfolio',
                'nav-contact': 'Contact',
                'hero-design': 'design',
                'hero-words': ['appropriate', 'useful', 'authentic', 'strategic', 'cortés'],
                'hero-intro': 'Strategies and innovation for brands that want to show what they truly are and not disguise themselves as trends or passing fads.',
                'hero-scroll': 'What am I saying?',
                'manifiesto-title': 'Sense <br>before <br><span class="garamond-bold-italic text-slate-500 lowercase">empty looks</span>.',
                'manifiesto-p1': 'I understand branding as the <span class="garamond-bold-italic text-slate-900">construction of meaning</span>. It is not only about designing "pretty" identities, but clearly defining what a brand represents.',
                'manifiesto-h1': '<span class="garamond-bold-italic text-brand-accent">Differentiation</span> with coherence',
                'manifiesto-desc1': 'My work focuses on building brands understood as systems. Each project is approached from its particular context.',
                'manifiesto-h2': '<span class="garamond-bold-italic text-brand-accent">Function</span> over trend',
                'manifiesto-desc2': 'Design is a service discipline whose validation lies in the fulfillment of its function. I prioritize the resolution of real problems.',
                'manifiesto-h3': '<span class="garamond-bold-italic text-brand-accent">Legacy</span> over ephemeral',
                'manifiesto-desc3': 'Brands should not be temporary. I design solutions intended to withstand the test of time and provide lasting value.',
                'port-title': 'Case <span class="garamond-bold-italic font-bold text-brand-accent">portfolio</span>',
                'case-name-coboce': 'COBOCE COOP',
                'case-phrase-coboce': 'Bringing people back to the industry',
                'case-name-wistupiku': 'WIST\'UPIKU',
                'case-phrase-wistupiku': 'From cultural rescue, its fun side',
                'case-name-simp3l': 'SIMP3L',
                'case-phrase-simp3l': 'Equal, but not that much',
                'contact-title': 'Let\'s talk about <br><span class="garamond-bold-italic text-slate-800 lowercase">meaning and permanence</span>.'
            }
        };

        let currentLang = 'es';
        let flipIntervalId = null;

        function setLanguage(lang) {
            currentLang = lang;
            const fixedWordContainer = document.getElementById('fixed-word-container');
            const viewport = document.getElementById('flip-viewport');
            const addons = document.getElementById('addons-layer');
            
            addons.classList.remove('active');
            addons.innerHTML = '';

            if (lang === 'en') {
                fixedWordContainer.classList.replace('order-1', 'order-2');
                viewport.classList.replace('order-2', 'order-1');
                fixedWordContainer.style.paddingLeft = '0.02em';
                fixedWordContainer.style.paddingRight = '0';
            } else {
                fixedWordContainer.classList.replace('order-2', 'order-1');
                viewport.classList.replace('order-1', 'order-2');
                fixedWordContainer.style.paddingLeft = '0';
                fixedWordContainer.style.paddingRight = '0.11em';
            }

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });

            document.getElementById('manifiesto-title').innerHTML = translations[lang]['manifiesto-title'];
            document.getElementById('portfolio-title').innerHTML = translations[lang]['port-title'] || translations[lang]['portfolio-title'];
            document.getElementById('contact-title').innerHTML = translations[lang]['contact-title'];

            initHeroAnimation(translations[lang]['hero-words']);
            updateLangUI();
        }

        function updateLangUI() {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === currentLang);
            });
        }

        const nav = document.getElementById('main-nav');
        const navBrand = document.getElementById('nav-brand');
        const navToggle = document.getElementById('nav-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const sections = document.querySelectorAll('.section-target');

        navToggle.addEventListener('click', () => {
            const isActive = mobileMenu.classList.toggle('active');
            navToggle.querySelector('i').classList.toggle('fa-bars');
            navToggle.querySelector('i').classList.toggle('fa-xmark');
            document.body.style.overflow = isActive ? 'hidden' : '';
        });

        function updateNavStyle() {
            let currentBg = 'rgba(202, 204, 203, 0.85)';
            let isDark = false;
            sections.forEach(section => {
                const rect = section.getBoundingClientRect();
                if (rect.top <= 80 && rect.bottom >= 80) {
                    const styles = window.getComputedStyle(section);
                    const rgb = styles.backgroundColor.match(/\d+/g);
                    if (rgb) currentBg = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.85)`;
                    if (section.id === 'herramientas') isDark = true;
                }
            });
            nav.style.backgroundColor = currentBg;
            const textColor = isDark ? '#fff' : '#1e293b';
            navBrand.style.color = textColor;
            navToggle.style.color = textColor;
            document.querySelectorAll('.nav-link').forEach(l => l.style.color = textColor);
            document.querySelectorAll('.lang-btn').forEach(b => b.style.color = textColor);
        }

        window.addEventListener('scroll', updateNavStyle);

        function initHeroAnimation(words) {
            if (flipIntervalId) clearTimeout(flipIntervalId);
            const list = document.getElementById('flip-list');
            const viewport = document.getElementById('flip-viewport');
            const addons = document.getElementById('addons-layer');
            list.innerHTML = '';
            words.forEach((w) => {
                const li = document.createElement('li');
                li.className = 'flip-item';
                li.innerHTML = `<span class="garamond-bold-italic text-brand-accent">${w}</span>`;
                list.appendChild(li);
            });

            const items = document.querySelectorAll('.flip-item');
            let currentIndex = 0;
            const baseDelay = 2800;

            function adjustWidth(idx) {
                const item = items[idx];
                const target = item.querySelector('.garamond-bold-italic');
                if (target) { viewport.style.width = (target.getBoundingClientRect().width + 10) + 'px'; }
            }

            adjustWidth(0);
            list.style.transform = `translateY(0)`;

            function cycle() {
                addons.classList.remove('active');
                currentIndex = (currentIndex + 1) % items.length;
                adjustWidth(currentIndex);
                const h = items[0].offsetHeight;
                list.style.transform = `translateY(-${currentIndex * h}px)`;
                const isLast = (currentIndex === items.length - 1);
                
                if (isLast && currentLang === 'en') {
                    setTimeout(() => {
                        const targetWord = items[currentIndex].querySelector('.garamond-bold-italic');
                        const rect = targetWord.getBoundingClientRect();
                        const headlineRect = document.getElementById('hero-headline').getBoundingClientRect();
                        const wordEndPos = rect.right - headlineRect.left;
                        const wordBaselinePos = rect.bottom - headlineRect.top;
                        
                        addons.innerHTML = `
                            <span class="absolute text-[0.75em] leading-none text-brand-accent" 
                                  style="left: ${wordEndPos}px; top: ${rect.top - headlineRect.top - 8}px;">*</span>
                            <span class="absolute text-[16px] md:text-[32px] font-medium text-black titillium-base leading-none lowercase whitespace-nowrap" 
                                  style="left: ${wordEndPos}px; top: ${wordBaselinePos + 10}px; transform: translateX(-100%);">* polite</span>
                        `;
                        addons.classList.add('active');
                    }, 850);
                }
                let nextDelay = isLast ? baseDelay * 3 : baseDelay;
                flipIntervalId = setTimeout(cycle, nextDelay);
            }
            flipIntervalId = setTimeout(cycle, baseDelay);
        }

        window.onload = () => {
            const userLang = navigator.language || navigator.userLanguage;
            setLanguage(userLang.startsWith('es') ? 'es' : 'en');
            updateNavStyle();
        };

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) window.scrollTo({ top: target.getBoundingClientRect().top + window.pageYOffset - 80, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
